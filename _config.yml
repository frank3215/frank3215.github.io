# Site settings
locale                   : "en"
title                    : "Gefei Chen"
title_separator          : "-"
subtitle                 : "陈格非"
name                     : "Gefei Chen"
description              : "CS master at Peking University · Computer Vision"
url                      : "https://frank3215.github.io"
baseurl                  : ""
repository               : "frank3215/frank3215.github.io"
teaser                   : "/assets/images/teaser.jpg"

# Social
github_username          : frank3215
email                    : chengefei@stu.pku.edu.cn

# Build settings
remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
search                   : true

# Markdown
markdown                 : kramdown
highlighter              : rouge
kramdown:
  input                  : GFM
  hard_wrap              : false

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Author
author:
  name             : "陈格非"
  avatar           : "/assets/images/bio-photo.jpg"
  bio              : "CS master at PKU · Computer Vision"
  location         : "Beijing"
  email            : "chengefei@stu.pku.edu.cn"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/frank3215"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:chengefei@stu.pku.edu.cn"

# Analytics
analytics:
  provider               : false

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/frank3215"

# Reading files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - Gemfile
  - Gemfile.lock

# Pagination
paginate: 5
paginate_path: /page:num/
